[package]
name = "diffusionx"
authors = ["xiangong tang <tangxiangong@gmail.com>"]
edition = "2024"
version = "0.3.2"
description = "A library for random number/stochastic process simulation with high performance."
license = "MIT OR Apache-2.0"
repository = "https://github.com/tangxiangong/diffusionx"
readme = "README.md"

[lib]
name = "diffusionx"
crate-type = ["cdylib", "lib"]
doctest = false

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[features]
default = ["visualize"]
visualize = ["plotters", "derive_builder", "plotters-backend"]

[dependencies]
rand_distr = { version = "0.5.0", features = ["std_math"] }
rand = "0.9.0"
rayon = "1.10.0"
thiserror = "2"
num-traits = "0.2.19"
rustfft = "6.2.0"
num-complex = "0.4.6"
once_cell = "1.21.3"

# optional dependencies
plotters = { version = "0.3.7", optional = true }
plotters-backend = { version = "0.3.5", optional = true }
derive_builder = { version = "0.20.2", optional = true }
