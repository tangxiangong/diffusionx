[package]
name = "diffusionx"
authors = ["Xiangong Tang <tangxiangong@gmail.com>"]
edition = "2024"
version = "0.3.9"
description = "A Rust crate for random number/stochastic process simulation with high performance."
license = "MIT OR Apache-2.0"
repository = "https://github.com/tangxiangong/diffusionx"
readme = "README.md"
categories = ["science", "mathematics"]
keywords = ["math", "random number", "stochastic process", "anomalous diffusion"]

[lib]
name = "diffusionx"
doctest = false

[profile.release]
lto = true
codegen-units = 1
panic = "abort"

[features]
default = ["visualize", "csv"]
visualize = ["plotters", "derive_builder", "plotters-backend"]

[dependencies]
rand_distr =  "0.5"
rand = "0.9"
rayon = "1.10"
thiserror = "2"
num-traits = "0.2"
rustfft = "6.3"
num-complex = "0.4"
once_cell = "1.21"
gauss-quad = "0.2.3"

# optional dependencies
plotters = { version = "0.3", optional = true }
plotters-backend = { version = "0.3", optional = true }
derive_builder = { version = "0.20", optional = true }
csv = { version = "1.3.1", optional = true }
